<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravestore.lk | Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff007f, #7928ca, #00dfd8, #ff007f);
            background-size: 400% 400%;
            animation: gradientBg 12s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 90%;
            width: 500px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .glow-text {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to right, #00dfd8, #fff, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(0,223,216,0.6)); }
            100% { transform: scale(1.03); filter: drop-shadow(0 0 15px rgba(255,0,127,0.8)); }
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* Ambient background glow dots for extra flashiness */
        .glow-dot {
            position: absolute;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(50px);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <!-- Decorative background elements -->
    <div class="glow-dot" style="top: 20%; left: 20%; background: #00dfd8;"></div>
    <div class="glow-dot" style="bottom: 20%; right: 20%; background: #ff007f;"></div>

    <div class="container">
        <h1>Ravestore.lk</h1>
        <div class="glow-text">Coming Soon</div>
        <p class="footer-text">Something awesome is in the works.</p>
    </div>

</body>
</html>
